<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password — RentPortal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Instrument+Serif:ital@0;1&family=Martian+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --night:   #080a0f;
      --deep:    #0d1017;
      --panel:   #12161f;
      --edge:    rgba(255,255,255,0.06);
      --edge2:   rgba(255,255,255,0.12);
      --accent:  #3b82f6;
      --accent2: #06b6d4;
      --text:    #f0f4ff;
      --muted:   #64748b;
      --error:   #f87171;
      --success: #4ade80;
      --font-d:  'Instrument Serif', Georgia, serif;
      --font-b:  'Syne', sans-serif;
      --font-m:  'Martian Mono', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }

    body {
      background: var(--night);
      color: var(--text);
      font-family: var(--font-b);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
      position: relative;
      overflow: hidden;
    }

    /* Grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 50px 50px;
      mask-image: radial-gradient(ellipse 70% 70% at 50% 50%, black 30%, transparent 100%);
      pointer-events: none;
    }

    /* Blue glow */
    body::after {
      content: '';
      position: fixed;
      top: 30%; left: 50%;
      transform: translateX(-50%);
      width: 500px; height: 400px;
      background: radial-gradient(ellipse, rgba(59,130,246,0.12), transparent 70%);
      pointer-events: none;
    }

    .card {
      position: relative;
      z-index: 1;
      width: min(420px, 100%);
      background: var(--panel);
      border: 1px solid var(--edge2);
      border-radius: 20px;
      padding: 2.5rem;
      box-shadow: 0 40px 80px rgba(0,0,0,0.6);
      animation: cardIn 0.6s cubic-bezier(0.34,1.2,0.64,1) both;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: scale(0.94) translateY(20px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    /* Top accent line */
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 20px 20px 0 0;
    }

    .card-icon {
      width: 56px; height: 56px;
      background: rgba(59,130,246,0.1);
      border: 1px solid rgba(59,130,246,0.25);
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.4rem;
      margin-bottom: 1.5rem;
    }

    .card-title {
      font-family: var(--font-d);
      font-style: italic;
      font-size: 1.9rem;
      font-weight: 400;
      color: var(--text);
      margin-bottom: 0.4rem;
    }

    .card-sub {
      font-family: var(--font-m);
      font-size: 0.68rem;
      color: var(--muted);
      letter-spacing: 0.06em;
      margin-bottom: 2rem;
      line-height: 1.6;
    }

    /* Steps indicator */
    .steps {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      margin-bottom: 2rem;
    }

    .step-dot {
      height: 3px;
      border-radius: 99px;
      background: var(--edge2);
      flex: 1;
      transition: background 0.4s;
    }

    .step-dot.active { background: var(--accent); }
    .step-dot.done   { background: var(--success); }

    /* Form panels */
    .step-panel { display: none; animation: panelIn 0.35s ease both; }
    .step-panel.active { display: block; }

    @keyframes panelIn {
      from { opacity: 0; transform: translateX(10px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    .field {
      position: relative;
      margin-bottom: 1rem;
    }

    .field label {
      display: block;
      font-family: var(--font-m);
      font-size: 0.62rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.4rem;
    }

    .field input {
      width: 100%;
      background: var(--deep);
      border: 1px solid var(--edge);
      border-radius: 9px;
      color: var(--text);
      font-family: var(--font-b);
      font-size: 0.85rem;
      padding: 0.75rem 2.8rem 0.75rem 1rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .field input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(59,130,246,0.12);
    }

    .field input::placeholder { color: var(--muted); font-size: 0.8rem; }

    /* Eye button */
    .eye-btn {
      position: absolute;
      right: 0.85rem; top: calc(50% + 10px);
      transform: translateY(-50%);
      background: none; border: none;
      cursor: pointer; padding: 0; margin: 0;
      width: auto; color: var(--muted);
      font-size: 1rem; line-height: 1;
      display: flex; align-items: center;
      transition: color 0.2s;
    }
    .eye-btn:hover { color: var(--accent); }
    .eye-btn::before, .eye-btn::after { display: none; }

    .btn-primary {
      width: 100%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      font-family: var(--font-b);
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.85rem;
      border: none;
      border-radius: 9px;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 4px 20px rgba(59,130,246,0.3);
      margin-top: 0.5rem;
      position: relative;
      overflow: hidden;
    }

    .btn-primary::after {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
      transition: left 0.4s;
    }

    .btn-primary:hover::after { left: 100%; }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(59,130,246,0.5); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .back-link {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      margin-top: 1.5rem;
      font-family: var(--font-m);
      font-size: 0.68rem;
      color: var(--muted);
      text-decoration: none;
      letter-spacing: 0.06em;
      transition: color 0.2s;
    }

    .back-link:hover { color: var(--accent); }

    /* OTP boxes */
    .otp-wrap {
      display: flex;
      gap: 0.5rem;
      justify-content: center;
      margin: 1rem 0;
    }

    .otp-input {
      width: 48px !important;
      height: 56px;
      text-align: center;
      font-family: var(--font-m) !important;
      font-size: 1.4rem !important;
      font-weight: 700;
      padding: 0 !important;
      border-radius: 10px !important;
      border: 1px solid var(--edge2) !important;
      background: var(--deep) !important;
      color: var(--text) !important;
    }

    .otp-input:focus {
      border-color: var(--accent) !important;
      box-shadow: 0 0 0 3px rgba(59,130,246,0.15) !important;
      outline: none;
    }

    .resend-row {
      text-align: center;
      font-family: var(--font-m);
      font-size: 0.65rem;
      color: var(--muted);
      margin-top: 0.75rem;
    }

    .resend-btn {
      background: none; border: none;
      color: var(--accent); cursor: pointer;
      font-family: var(--font-m);
      font-size: 0.65rem;
      padding: 0; margin: 0; width: auto;
      text-decoration: underline;
    }

    .resend-btn:disabled { color: var(--muted); text-decoration: none; cursor: not-allowed; }

    /* Match indicator */
    .match-indicator {
      font-family: var(--font-m);
      font-size: 0.62rem;
      letter-spacing: 0.06em;
      margin-top: -0.5rem;
      margin-bottom: 0.5rem;
      padding-left: 0.25rem;
      height: 14px;
    }
    .match-indicator.match   { color: var(--success); }
    .match-indicator.nomatch { color: var(--error); }

    /* Success state */
    .success-icon {
      width: 64px; height: 64px;
      background: rgba(74,222,128,0.1);
      border: 1px solid rgba(74,222,128,0.3);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.8rem;
      margin: 0 auto 1.5rem;
      animation: popIn 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
    }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.5); }
      to   { opacity: 1; transform: scale(1); }
    }

    /* Toast */
    #toast {
      position: fixed;
      bottom: 2rem; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--panel);
      border: 1px solid var(--edge2);
      border-radius: 10px;
      padding: 0.75rem 1.4rem;
      font-family: var(--font-m);
      font-size: 0.72rem;
      color: var(--text);
      opacity: 0;
      transition: all 0.3s ease;
      z-index: 9999;
      pointer-events: none;
      white-space: nowrap;
    }

    #toast.show    { opacity: 1; transform: translateX(-50%) translateY(0); }
    #toast.error   { border-color: rgba(248,113,113,0.5); color: var(--error); }
    #toast.success { border-color: rgba(74,222,128,0.5);  color: var(--success); }
  </style>
</head>
<body>

<div id="toast"></div>

<div class="card">
  <div class="card-icon">🔑</div>
  <div class="card-title">Reset password.</div>
  <div class="card-sub" id="cardSub">ENTER YOUR EMAIL TO RECEIVE A RESET CODE</div>

  <!-- Step dots -->
  <div class="steps">
    <div class="step-dot active" id="dot1"></div>
    <div class="step-dot"        id="dot2"></div>
    <div class="step-dot"        id="dot3"></div>
  </div>

  <!-- STEP 1: Email -->
  <div class="step-panel active" id="step1">
    <div class="field">
      <label>Email Address</label>
      <input type="email" id="resetEmail" placeholder="your@email.com">
    </div>
    <button class="btn-primary" onclick="sendResetCode()">Send Reset Code →</button>
    <a href="auth.html" class="back-link">← Back to Login</a>
  </div>

  <!-- STEP 2: OTP -->
  <div class="step-panel" id="step2">
    <div style="font-size:0.82rem;color:var(--muted);margin-bottom:1rem;line-height:1.7">
      A 6-digit code was sent to <strong id="sentTo" style="color:var(--text)"></strong>. Enter it below.
    </div>
    <div class="otp-wrap">
      <input type="text" class="otp-input" maxlength="1" oninput="otpNext(this,0)">
      <input type="text" class="otp-input" maxlength="1" oninput="otpNext(this,1)">
      <input type="text" class="otp-input" maxlength="1" oninput="otpNext(this,2)">
      <input type="text" class="otp-input" maxlength="1" oninput="otpNext(this,3)">
      <input type="text" class="otp-input" maxlength="1" oninput="otpNext(this,4)">
      <input type="text" class="otp-input" maxlength="1" oninput="otpNext(this,5)">
    </div>
    <div class="resend-row">
      Didn't get it? <button class="resend-btn" id="resendBtn" onclick="resendCode()">Resend</button>
      <span id="resendTimer"></span>
    </div>
    <button class="btn-primary" onclick="verifyCode()" style="margin-top:1rem">Verify Code →</button>
    <a href="#" class="back-link" onclick="goStep(1)">← Back</a>
  </div>

  <!-- STEP 3: New password -->
  <div class="step-panel" id="step3">
    <div class="field">
      <label>New Password</label>
      <input type="password" id="newPw" placeholder="Min. 6 characters" oninput="checkPwMatch()">
      <button class="eye-btn" type="button" onclick="toggleEye('newPw', this)">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
      </button>
    </div>
    <div class="field">
      <label>Confirm New Password</label>
      <input type="password" id="confirmPw" placeholder="Repeat password" oninput="checkPwMatch()">
      <button class="eye-btn" type="button" onclick="toggleEye('confirmPw', this)">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
      </button>
    </div>
    <div class="match-indicator" id="matchIndicator"></div>
    <button class="btn-primary" onclick="resetPassword()">Reset Password →</button>
    <a href="#" class="back-link" onclick="goStep(2)">← Back</a>
  </div>

  <!-- STEP 4: Success -->
  <div class="step-panel" id="step4">
    <div style="text-align:center;padding:1rem 0">
      <div class="success-icon">✓</div>
      <div style="font-family:'Instrument Serif',serif;font-style:italic;font-size:1.5rem;margin-bottom:0.5rem">Password updated!</div>
      <div style="font-size:0.82rem;color:var(--muted);margin-bottom:2rem;line-height:1.7">Your password has been reset successfully. You can now sign in with your new password.</div>
      <a href="auth.html" class="btn-primary" style="text-decoration:none;display:block;text-align:center">Go to Login →</a>
    </div>
  </div>

</div>

<script src="config.js"></script>
<script>
  let currentStep = 1;
  let verifiedEmail = '';
  let verifiedCode  = '';
  let resendInterval;

  function goStep(n) {
    document.querySelectorAll('.step-panel').forEach(p => p.classList.remove('active'));
    document.getElementById('step' + n).classList.add('active');
    currentStep = n;

    // Update dots
    ['dot1','dot2','dot3'].forEach((id, i) => {
      const dot = document.getElementById(id);
      dot.className = 'step-dot';
      if (i + 1 < n)  dot.classList.add('done');
      if (i + 1 === n) dot.classList.add('active');
    });

    // Update subtitle
    const subs = {
      1: 'ENTER YOUR EMAIL TO RECEIVE A RESET CODE',
      2: 'CHECK YOUR EMAIL FOR THE 6-DIGIT CODE',
      3: 'CHOOSE A STRONG NEW PASSWORD',
    };
    document.getElementById('cardSub').textContent = subs[n] || '';
  }

  async function sendResetCode() {
    const email = document.getElementById('resetEmail').value.trim();
    if (!email) { showToast('Enter your email address', 'error'); return; }

    try {
      const res  = await fetch(`${CONFIG.API_URL}/forgot-password`, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ email })
      });
      const data = await res.json();

      if (!res.ok) { showToast(data.message || 'Email not found', 'error'); return; }

      verifiedEmail = email;
      document.getElementById('sentTo').textContent = email;
      showToast('Code sent! Check your email 📧', 'success');
      goStep(2);
      startResendTimer();

    } catch {
      showToast('Network error — try again', 'error');
    }
  }

  function otpNext(input, index) {
    input.value = input.value.replace(/\D/g, '');
    const inputs = document.querySelectorAll('.otp-input');
    if (input.value && index < 5) inputs[index + 1].focus();
  }

  // Handle backspace on OTP
  document.addEventListener('keydown', e => {
    if (e.key === 'Backspace') {
      const inputs = Array.from(document.querySelectorAll('.otp-input'));
      const idx    = inputs.indexOf(document.activeElement);
      if (idx > 0 && !inputs[idx].value) inputs[idx - 1].focus();
    }
  });

  async function verifyCode() {
    const inputs = document.querySelectorAll('.otp-input');
    const code   = Array.from(inputs).map(i => i.value).join('');

    if (code.length < 6) { showToast('Enter the full 6-digit code', 'error'); return; }

    try {
      const res  = await fetch(`${CONFIG.API_URL}/verify-reset-code`, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ email: verifiedEmail, code })
      });
      const data = await res.json();

      if (!res.ok) { showToast(data.message || 'Invalid code', 'error'); return; }

      verifiedCode = code;
      showToast('Code verified ✓', 'success');
      goStep(3);

    } catch {
      showToast('Network error — try again', 'error');
    }
  }

  async function resetPassword() {
    const newPw     = document.getElementById('newPw').value;
    const confirmPw = document.getElementById('confirmPw').value;

    if (!newPw)            { showToast('Enter a new password', 'error'); return; }
    if (newPw.length < 6)  { showToast('Password must be at least 6 characters', 'error'); return; }
    if (newPw !== confirmPw) { showToast('Passwords do not match', 'error'); return; }

    try {
      const res  = await fetch(`${CONFIG.API_URL}/reset-password-confirm`, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ email: verifiedEmail, code: verifiedCode, newPassword: newPw })
      });
      const data = await res.json();

      if (!res.ok) { showToast(data.message || 'Reset failed', 'error'); return; }

      goStep(4);

    } catch {
      showToast('Network error — try again', 'error');
    }
  }

  async function resendCode() {
    document.getElementById('resendBtn').disabled = true;
    await sendResetCode();
    startResendTimer();
  }

  function startResendTimer() {
    let secs = 60;
    const btn   = document.getElementById('resendBtn');
    const timer = document.getElementById('resendTimer');
    btn.disabled = true;
    clearInterval(resendInterval);
    resendInterval = setInterval(() => {
      secs--;
      timer.textContent = ` (${secs}s)`;
      if (secs <= 0) {
        clearInterval(resendInterval);
        btn.disabled = false;
        timer.textContent = '';
      }
    }, 1000);
  }

  function checkPwMatch() {
    const pw      = document.getElementById('newPw').value;
    const confirm = document.getElementById('confirmPw').value;
    const ind     = document.getElementById('matchIndicator');
    if (!confirm) { ind.textContent = ''; ind.className = 'match-indicator'; return; }
    if (pw === confirm) { ind.textContent = '✓ Passwords match'; ind.className = 'match-indicator match'; }
    else                { ind.textContent = '✗ Does not match';  ind.className = 'match-indicator nomatch'; }
  }

  function toggleEye(id, btn) {
    const inp     = document.getElementById(id);
    const showing = inp.type === 'text';
    inp.type      = showing ? 'password' : 'text';
    btn.innerHTML = showing
      ? `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`
      : `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`;
  }

  function showToast(msg, type = '') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className   = 'show ' + type;
    clearTimeout(t._t);
    t._t = setTimeout(() => { t.className = ''; }, 3500);
  }
</script>
</body>
</html>
